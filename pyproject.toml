[tool.ruff]
target-version = "py313"
line-length = 100

[tool.ruff.lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort
    "N",     # pep8-naming
    "UP",    # pyupgrade
    "B",     # flake8-bugbear
    "SIM",   # flake8-simplify
    "TCH",   # flake8-type-checking
    "RUF",   # ruff-specific rules
    "S",     # flake8-bandit (security)
    "C90",   # mccabe (complexity)
    "A",     # flake8-builtins (shadowing builtins)
    "DTZ",   # flake8-datetimez (timezone awareness)
    "T20",   # flake8-print (no print statements)
    "PT",    # flake8-pytest-style
    "ARG",   # flake8-unused-arguments
    "TRY",   # tryceratops (exception handling)
    "ASYNC", # flake8-async
    "PL",    # pylint (comprehensive checks)
    "PERF",  # perflint (performance)
    "LOG",   # flake8-logging
]
ignore = [
    "E501",    # line too long (handled by formatter)
    "S101",    # assert usage (OK in tests and type narrowing)
    "S311",    # pseudo-random generators (OK for non-crypto use like sensor drift)
    "DTZ005",  # naive datetime (used consistently, no timezone requirements)
    "PLW0603", # global statement (intentional for module-level state)
    "PLR0913", # too many arguments (can be overly strict)
    "TRY003",  # long exception messages (often necessary)
    "SIM105",  # try-except-pass vs contextlib.suppress (explicit is better for testability)
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["PLR2004", "S106", "S105", "ARG002"]
"scripts/**" = ["T20"]
"backend/config.py" = ["S105"]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.pylint]
max-args = 7
max-branches = 12
max-returns = 6
max-statements = 50

[tool.ruff.lint.isort]
known-first-party = ["backend", "tui"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.coverage.run]
source = ["backend"]
branch = true

[tool.coverage.report]
fail_under = 100
show_missing = true
exclude_lines = [
    "if TYPE_CHECKING:",
    "class.*Protocol",
    "@overload",
    "pragma: no cover",
    "if __name__ == .__main__.:",
]

[tool.mypy]
python_version = "3.13"
strict = true
