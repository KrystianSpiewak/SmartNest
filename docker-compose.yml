services:
  mqtt-broker:
    image: hivemq/hivemq-ce:2025.5
    container_name: smartnest-mqtt
    ports:
      - "1883:1883"
    volumes:
      - ./config/mqtt/config.xml:/opt/hivemq/conf/config.xml:ro
      - ./config/mqtt/logback-dev.xml:/opt/hivemq/conf/logback.xml:ro
      - mqtt-data:/opt/hivemq/data
      - ./logs/mqtt:/opt/hivemq/log
    environment:
      - HIVEMQ_LOG_LEVEL=DEBUG
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f hivemq.jar > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - smartnest

networks:
  smartnest:
    driver: bridge

volumes:
  mqtt-data:
    name: smartnest-mqtt-data
